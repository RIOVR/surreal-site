# Decap CMS — Configuração do Surreal (trilíngue PT/EN/ES)
# Cada campo traduzível tem 3 subcampos: pt, en, es.

backend:
  name: github
  repo: RIOVR/surreal-site
  branch: main
  base_url: https://surreal-site.vercel.app
  auth_endpoint: api/auth

media_folder: "assets"
public_folder: "assets"
locale: 'pt'

site_url: https://surreal-site.vercel.app
display_url: https://surreal-site.vercel.app
logo_url: https://surreal-site.vercel.app/assets/logo-wordmark.png

collections:
  - name: "cardapio"
    label: "Cardápio Surreal"
    files:
      - name: "data"
        label: "Dados do cardápio"
        file: "data.json"
        format: "json"
        fields:
          # ---------------- INFO ----------------
          - label: "Informações do bar"
            name: "info"
            widget: "object"
            fields:
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "Site", name: "site", widget: "string" }
              - label: "Tagline (frase curta)"
                name: "tagline"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }
              - label: "Endereço"
                name: "address"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }

          # ---------------- HORÁRIOS ----------------
          - label: "Horários de funcionamento"
            name: "horarios"
            widget: "list"
            summary: "{{fields.dias.pt}} · {{fields.horas}}"
            fields:
              - label: "Dias da semana"
                name: "dias"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português (ex: Seg–Qui)", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English (ex: Mon–Thu)",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español (ex: Lun–Jue)",    name: "es", widget: "string" }
              - { label: "Horas (igual nos 3 idiomas, ex: 12H-16H / 18H-00H)", name: "horas", widget: "string" }

          # ---------------- FRASES DO PORTAL ----------------
          - label: "Frases rotativas do portal"
            name: "provocacoes"
            widget: "list"
            fields:
              - { label: "🇧🇷 Português", name: "pt", widget: "string" }
              - { label: "🇬🇧 English",    name: "en", widget: "string" }
              - { label: "🇪🇸 Español",    name: "es", widget: "string" }

          # ---------------- PRATOS ----------------
          - label: "Pratos (comidas)"
            name: "menu"
            widget: "list"
            summary: "{{fields.nome.pt}} — R$ {{fields.preco}}"
            fields:
              - { label: "ID único", name: "id", widget: "string" }
              - label: "Seção"
                name: "secao"
                widget: "select"
                options:
                  - { label: "Entradas", value: "entradas" }
                  - { label: "Sanduíches", value: "sanduiches" }
                  - { label: "Pratos principais", value: "principais" }
                  - { label: "Sobremesas", value: "sobremesas" }
              - { label: "Preço (R$)", name: "preco", widget: "number", value_type: "int" }
              - { label: "Foto", name: "photo", widget: "image", required: false }
              - label: "Tag"
                name: "tag"
                widget: "select"
                required: false
                options:
                  - { label: "Sem tag", value: "" }
                  - { label: "Chef", value: "Chef" }
                  - { label: "Assinatura", value: "Assinatura" }
                  - { label: "Clássico", value: "Clássico" }
                  - { label: "Teatro", value: "Teatro" }
                  - { label: "Veggie", value: "Veggie" }
                  - { label: "Vegano", value: "Vegano" }
                  - { label: "Novo", value: "Novo" }
              - label: "Alérgenos"
                name: "alerg"
                widget: "list"
                required: false
                field: { label: "Alérgeno", name: "item", widget: "string" }
              - label: "Tipo (badge)"
                name: "tipo"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }
              - label: "Nome do prato"
                name: "nome"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }
              - label: "Descrição"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "text" }
                  - { label: "🇬🇧 English",    name: "en", widget: "text" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "text" }
              - label: "Poema"
                name: "poema"
                widget: "object"
                fields:
                  - label: "🇧🇷 Português"
                    name: "pt"
                    widget: "list"
                    required: false
                    field: { label: "Linha", name: "linha", widget: "string" }
                  - label: "🇬🇧 English"
                    name: "en"
                    widget: "list"
                    required: false
                    field: { label: "Line", name: "linha", widget: "string" }
                  - label: "🇪🇸 Español"
                    name: "es"
                    widget: "list"
                    required: false
                    field: { label: "Línea", name: "linha", widget: "string" }

          # ---------------- BEBIDAS ----------------
          - label: "Bebidas (drinks, chopp, sucos)"
            name: "bebidas"
            widget: "list"
            summary: "{{fields.nome.pt}} — R$ {{fields.preco}}"
            fields:
              - { label: "ID único", name: "id", widget: "string" }
              - label: "Seção"
                name: "secao"
                widget: "select"
                options:
                  - { label: "Leves, pops & perigosos", value: "leves" }
                  - { label: "Intensos, amargos & envolventes", value: "intensos" }
                  - { label: "Sem álcool", value: "sem-alcool" }
                  - { label: "Clássicos zero álcool", value: "classicos-zero" }
                  - { label: "Drinks clássicos", value: "classicos" }
                  - { label: "Chopp", value: "chopp" }
                  - { label: "Cervejas artesanais", value: "cervejas" }
                  - { label: "Sucos & soft", value: "soft" }
              - { label: "Preço (R$)", name: "preco", widget: "number", value_type: "int" }
              - { label: "Volume em ml", name: "ml", widget: "number", required: false, value_type: "int" }
              - { label: "Tag", name: "tag", widget: "string", required: false }
              - label: "Base (filtro)"
                name: "base"
                widget: "select"
                options:
                  - { label: "Gin", value: "Gin" }
                  - { label: "Vodka", value: "Vodka" }
                  - { label: "Whisky", value: "Whisky" }
                  - { label: "Tequila", value: "Tequila" }
                  - { label: "Cachaça", value: "Cachaça" }
                  - { label: "Rum", value: "Rum" }
                  - { label: "Campari", value: "Campari" }
                  - { label: "Aperol", value: "Aperol" }
                  - { label: "Zero (sem álcool)", value: "Zero" }
                  - { label: "Cerveja", value: "Cerveja" }
                  - { label: "Soft / suco", value: "Soft" }
              - { label: "Foto", name: "photo", widget: "image", required: false }
              - label: "Alérgenos"
                name: "alerg"
                widget: "list"
                required: false
                field: { label: "Alérgeno", name: "item", widget: "string" }
              - label: "Nome"
                name: "nome"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }
              - label: "Descrição (ingredientes)"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "text" }
                  - { label: "🇬🇧 English",    name: "en", widget: "text" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "text" }
              - label: "Poema"
                name: "poema"
                widget: "object"
                fields:
                  - label: "🇧🇷 Português"
                    name: "pt"
                    widget: "list"
                    required: false
                    field: { label: "Linha", name: "linha", widget: "string" }
                  - label: "🇬🇧 English"
                    name: "en"
                    widget: "list"
                    required: false
                    field: { label: "Line", name: "linha", widget: "string" }
                  - label: "🇪🇸 Español"
                    name: "es"
                    widget: "list"
                    required: false
                    field: { label: "Línea", name: "linha", widget: "string" }

          # ---------------- VINHOS ----------------
          - label: "Vinhos"
            name: "vinhos"
            widget: "list"
            summary: "{{fields.vinicola}} · {{fields.tipo}} · {{fields.nome.pt}} — R$ {{fields.preco}}"
            fields:
              - { label: "ID único", name: "id", widget: "string" }
              - { label: "Preço (R$)", name: "preco", widget: "number", value_type: "int" }
              - { label: "Volume em ml", name: "ml", widget: "number", required: false, value_type: "int" }
              - { label: "Vinícola (ex: Expresso Bodeguero, Três Palácios). Deixe em branco em 'Taça de Vinho' genérica.", name: "vinicola", widget: "string", required: false }
              - label: "Tipo"
                name: "tipo"
                widget: "select"
                required: false
                options:
                  - { label: "Tinto", value: "Tinto" }
                  - { label: "Branco", value: "Branco" }
                  - { label: "Rosé", value: "Rosé" }
                  - { label: "Espumante", value: "Espumante" }
              - { label: "País de origem (ex: Argentina, Chile, Itália, Portugal, França)", name: "pais", widget: "string", required: false }
              - label: "Nome"
                name: "nome"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }
              - label: "Descrição (notas)"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "text" }
                  - { label: "🇬🇧 English",    name: "en", widget: "text" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "text" }

          # ---------------- EXTRAS ----------------
          - label: "Complementos (bacon, picles, molhos)"
            name: "extras"
            widget: "list"
            summary: "{{fields.item.pt}} — R$ {{fields.preco}}"
            fields:
              - { label: "Preço (R$)", name: "preco", widget: "number", value_type: "int" }
              - label: "Item"
                name: "item"
                widget: "object"
                fields:
                  - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                  - { label: "🇬🇧 English",    name: "en", widget: "string" }
                  - { label: "🇪🇸 Español",    name: "es", widget: "string" }

          # ---------------- SEÇÕES ----------------
          - label: "Títulos das seções do menu"
            name: "secoes"
            widget: "object"
            fields:
              - label: "Seções de comidas"
                name: "comidas"
                widget: "list"
                fields:
                  - { label: "ID interno", name: "id", widget: "string" }
                  - label: "Nome"
                    name: "nome"
                    widget: "object"
                    fields:
                      - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                      - { label: "🇬🇧 English",    name: "en", widget: "string" }
                      - { label: "🇪🇸 Español",    name: "es", widget: "string" }
                  - label: "Subtítulo"
                    name: "subtitle"
                    widget: "object"
                    fields:
                      - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                      - { label: "🇬🇧 English",    name: "en", widget: "string" }
                      - { label: "🇪🇸 Español",    name: "es", widget: "string" }
              - label: "Seções de bebidas"
                name: "drinks"
                widget: "list"
                fields:
                  - { label: "ID interno", name: "id", widget: "string" }
                  - label: "Nome"
                    name: "nome"
                    widget: "object"
                    fields:
                      - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                      - { label: "🇬🇧 English",    name: "en", widget: "string" }
                      - { label: "🇪🇸 Español",    name: "es", widget: "string" }
                  - label: "Subtítulo"
                    name: "subtitle"
                    widget: "object"
                    fields:
                      - { label: "🇧🇷 Português", name: "pt", widget: "string" }
                      - { label: "🇬🇧 English",    name: "en", widget: "string" }
                      - { label: "🇪🇸 Español",    name: "es", widget: "string" }
