<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Surreal — Cardápio para impressão</title>
  <link rel="icon" href="/assets/mascot.png" type="image/png" />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Anton&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

    @font-face {
      font-family: "Herbus";
      src: url("/assets/fonts/herbus-bold.woff2") format("woff2"),
           url("/assets/fonts/herbus-bold.woff") format("woff");
      font-weight: 700;
      font-display: swap;
    }

    :root {
      --paper:       #FFFFFF;        /* fundo branco — economiza tinta */
      --paper-soft:  #FFFFFF;
      --ink:         #0A0A0A;
      --red:         #E4322B;
      --red-dark:    #B8231D;
      --ember:       #B8231D;
      --muted:       #4A4A4A;        /* mais escuro pra contraste em fundo branco */
      --faint:       #7A7A7A;
      --border:      #BBBBBB;
    }

    /* ============ PAGE SETUP ============ */
    @page {
      size: A4 portrait;
      margin: 30mm 12mm 11mm; /* topo extra (30mm) pro prendedor da prancheta não cobrir o título */
    }
    @page :first {
      margin: 0;             /* CAPA sem margem — borda decorativa ocupa quase a página inteira */
    }

    * { box-sizing: border-box; }

    html, body {
      background: #ECECEC;          /* cinza só na visualização do navegador */
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @media print {
      html, body { background: white; }
    }

    /* Banner que aparece SÓ no navegador, some na hora de imprimir */
    .toolbar {
      background: var(--ink);
      color: white;
      padding: 18px 24px;
      text-align: center;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .toolbar strong { color: var(--red); }
    .toolbar kbd {
      background: rgba(255,255,255,0.12);
      padding: 3px 7px;
      border-radius: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }
    .toolbar button {
      margin-top: 12px;
      background: var(--red);
      color: white;
      border: none;
      padding: 10px 24px;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
    }
    .toolbar button:hover { background: var(--red-dark); }
    @media print { .toolbar { display: none !important; } }

    /* Container das páginas — visualização em tela */
    .pages-container {
      max-width: 220mm;
      margin: 30px auto;
      padding: 0 10px;
    }
    @media print {
      .pages-container { max-width: none; margin: 0; padding: 0; }
    }

    /* ============ PAGE ============ */
    .page {
      background: var(--paper);
      width: 100%;
      max-width: 200mm;
      min-height: 265mm;     /* um pouco menos que a área útil A4 (269mm) pra margem de segurança */
      padding: 0;
      margin: 0 auto 24px;
      page-break-after: always;
      break-after: always;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      overflow: hidden;
    }
    .page:last-child {
      page-break-after: avoid;
      break-after: avoid;
    }
    @media print {
      .page {
        box-shadow: none;
        margin: 0;
        max-width: none;
        min-height: 0;         /* deixa o conteúdo fluir livre no print */
        height: auto;
        overflow: visible;
      }
    }

    /* ============ COVER ============ */
    .cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24mm 18mm;
      min-height: 263mm;
      background: var(--paper);
      position: relative;
    }
    @media print {
      /* Cover ocupa o A4 inteiro (porque @page :first é margin 0) */
      .cover {
        min-height: 297mm;     /* altura completa A4 */
        height: 297mm;
        padding: 28mm 22mm;    /* respiro interno, já que não há @page margin */
      }
    }
    .cover::before {
      content: "";
      position: absolute;
      inset: 10mm;             /* na visualização */
      border: 2px solid var(--ink);
      pointer-events: none;
    }
    .cover::after {
      content: "";
      position: absolute;
      inset: 12mm;
      border: 1px solid var(--ink);
      pointer-events: none;
    }
    @media print {
      /* Bordas mais próximas da borda do papel — ocupam mais a página */
      .cover::before { inset: 8mm; }
      .cover::after  { inset: 11mm; }
    }
    .cover-inner {
      position: relative;
      z-index: 2;
    }
    .cover-mark {
      font-family: "Inter", sans-serif;
      font-size: 9pt;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10mm;
    }
    .cover-logo {
      width: 95mm;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      /* Logo já é preto sobre transparente — sem filtro */
    }
    .cover-divider {
      width: 50mm;
      height: 1px;
      background: var(--ink);
      margin: 8mm auto;
    }
    .cover-title {
      font-family: "Herbus", sans-serif;
      font-size: 48pt;
      line-height: 0.92;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .cover-title .red {
      color: var(--red);
      font-style: italic;
    }
    .cover-tag {
      font-family: "Libre Caslon Text", serif;
      font-style: italic;
      font-size: 14pt;
      color: var(--muted);
      margin: 10mm 0 0;
      max-width: 110mm;
      line-height: 1.4;
    }
    .cover-meta {
      font-family: "Inter", sans-serif;
      font-size: 8.5pt;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink);
      margin-top: 18mm;
    }
    .cover-meta span { color: var(--red); }

    /* ============ INNER PAGE ============ */
    .inner {
      padding: 0;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 1.5mm;
      margin-bottom: 3mm;
      border-bottom: 2px solid var(--ink);
    }
    .page-header h1 {
      font-family: "Herbus", sans-serif;
      font-size: 28pt;          /* compactado de 38pt */
      line-height: 1;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .page-header .subtitle {
      font-family: "Libre Caslon Text", serif;
      font-style: italic;
      font-size: 10pt;
      color: var(--muted);
    }

    /* Section Header (dentro de uma página) */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4mm;
      margin: 2mm 0 1mm;
      padding-bottom: 0.7mm;
      border-bottom: 1px solid var(--border);
      break-after: avoid;        /* não deixa header órfão no fim de coluna */
    }
    .section-name {
      font-family: "Herbus", sans-serif;
      font-size: 12pt;
      color: var(--red);
      line-height: 1;
      margin: 0;
      letter-spacing: -0.005em;
    }
    .section-subtitle {
      font-family: "Libre Caslon Text", serif;
      font-style: italic;
      font-size: 8.5pt;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* 2-column layout (auto-balance via CSS columns) */
    .columns-2 {
      column-count: 2;
      column-gap: 6mm;
      column-rule: 1px dotted var(--border);
    }
    .columns-2 > * {
      break-inside: avoid;
    }
    /* Single-column passthrough (items empilham verticalmente) */
    .columns-1 > * {
      break-inside: avoid;
    }
    /* Layout 2-colunas EXPLÍCITO (esquerda/direita fixas, não auto-balance) */
    .page-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 8mm;
      align-items: start;
    }
    .page-2col > div {
      min-width: 0;          /* evita overflow do grid */
    }

    /* Item (dish/drink) */
    .item {
      break-inside: avoid;
      margin-bottom: 1.3mm;
      padding-bottom: 0.9mm;
      border-bottom: 1px dotted var(--border);
    }
    .item:last-child {
      border-bottom: none;
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 3mm;
      margin-bottom: 0.3mm;
    }
    .item-name {
      font-family: "Libre Caslon Text", serif;
      font-style: italic;
      font-weight: 700;
      font-size: 10.5pt;        /* compactado de 11.5pt */
      color: var(--ink);
      line-height: 1.1;
    }
    .item-name .item-tag {
      display: inline-block;
      font-family: "Inter", sans-serif;
      font-style: normal;
      font-weight: 700;
      font-size: 6.5pt;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-left: 2mm;
      vertical-align: middle;
    }
    .item-name .item-tag.chef {
      color: white;
      background: var(--ink);
      padding: 1pt 4pt;
      border-radius: 999px;
      letter-spacing: 0.2em;
    }
    .item-name .item-meta {
      font-family: "JetBrains Mono", monospace;
      font-style: normal;
      font-weight: 500;
      font-size: 6.5pt;
      letter-spacing: 0.1em;
      color: var(--faint);
      margin-left: 2mm;
    }
    .item-price {
      font-family: "JetBrains Mono", monospace;
      font-size: 9.5pt;
      font-weight: 600;
      color: var(--ember);
      white-space: nowrap;
    }
    .item-desc {
      font-family: "Inter", sans-serif;
      font-size: 7.8pt;
      line-height: 1.28;
      color: var(--muted);
      margin: 0.3mm 0 0;
    }
    .item-base {
      display: inline-block;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 6.5pt;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
      margin-left: 2mm;
    }

    /* Vinícola block */
    .vinicola {
      break-inside: avoid;
      margin-bottom: 3mm;
    }
    .vinicola-header {
      display: flex;
      align-items: baseline;
      gap: 2mm;
      padding-bottom: 0.5mm;
      margin-bottom: 1mm;
      border-bottom: 1px solid var(--ink);
    }
    .vinicola-name {
      font-family: "Herbus", sans-serif;
      font-size: 11pt;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.005em;
    }
    .vinicola-pais {
      font-family: "Libre Caslon Text", serif;
      font-style: italic;
      font-size: 8.5pt;
      color: var(--ember);
    }
    .vinicola-tipo {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 6.5pt;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      margin: 1mm 0 0.7mm;
    }

    /* Extras (sanduíches) — destaque com borda vermelha grossa */
    .extras-box {
      margin-top: 3mm;
      padding: 3mm 4mm;
      border: 2px solid var(--red);
      border-radius: 2mm;
      background: rgba(228,50,43,0.025);    /* leve tinge vermelho — quase imperceptível */
      break-inside: avoid;
    }
    .extras-box .section-header {
      margin-top: 0;
      padding-bottom: 1mm;
      border-bottom: 1px solid var(--red);
    }
    .extras-box .section-name { font-size: 11pt; color: var(--red); }
    .extras-box .columns-1 .item, .extras-box .columns-2 .item, .extras-box .item {
      margin-bottom: 0.6mm;
      padding-bottom: 0;
      border-bottom: none;
    }
    .extras-box .columns-2 { column-rule: none; column-gap: 5mm; }

    /* Páginas com respiro maior (Bebidas e Vinhos) — fontes e margens generosas */
    .page-spacious .item { margin-bottom: 2.4mm; padding-bottom: 1.8mm; }
    .page-spacious .item-name { font-size: 11pt; line-height: 1.18; }
    .page-spacious .item-desc { font-size: 8.5pt; line-height: 1.4; margin-top: 0.8mm; }
    .page-spacious .section-name { font-size: 14pt; }
    .page-spacious .section-header { margin: 4mm 0 2.2mm; padding-bottom: 1.2mm; }
    .page-spacious .vinicola { margin-bottom: 5mm; }
    .page-spacious .vinicola-name { font-size: 13pt; }
    .page-spacious .vinicola-pais { font-size: 10pt; }
    .page-spacious .vinicola-tipo { font-size: 7.5pt; margin: 2mm 0 1.2mm; }
    .page-spacious .vinicola-header { margin-bottom: 1.8mm; padding-bottom: 1mm; }
    .page-spacious .page-2col { column-gap: 12mm; }

    /* Página final — info do bar */
    .footer-block-wrap {
      break-inside: avoid;        /* footer + legal sempre juntos */
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 6mm;
      margin-top: 2mm;
      padding-top: 1.5mm;
      border-top: 1.5px solid var(--ink);
    }
    .footer-block h3 {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 6.5pt;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      margin: 0 0 1mm;
    }
    .footer-block p, .footer-block div {
      font-family: "Inter", sans-serif;
      font-size: 7.5pt;
      line-height: 1.3;
      color: var(--ink);
      margin: 0;
    }
    .footer-block .muted {
      color: var(--muted);
      font-size: 7pt;
    }
    .legal {
      margin-top: 1.5mm;
      padding-top: 1mm;
      border-top: 1px dotted var(--border);
      font-family: "Inter", sans-serif;
      font-size: 6pt;
      line-height: 1.25;
      color: var(--muted);
      text-align: center;
    }
    /* Bloco unificado de avisos legais — mascote falando à esquerda */
    .legal-unified {
      display: flex;
      align-items: center;
      gap: 6mm;
      margin-top: 5mm;
      padding: 4mm 5mm;
      border: 2px solid var(--ink);
      border-radius: 3mm;
      break-inside: avoid;
    }
    .legal-mascot {
      width: 26mm;
      height: auto;
      flex-shrink: 0;
    }
    .legal-text {
      flex: 1;
      text-align: left;
    }
    .legal-unified h3 {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 9pt;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      margin: 0 0 1.5mm;
      text-align: left;
    }
    .legal-unified p {
      font-family: "Inter", sans-serif;
      font-size: 8pt;
      line-height: 1.4;
      color: var(--ink);
      margin: 0;
      text-align: left;
    }
    .legal strong { color: var(--ink); font-weight: 600; }

    .page-mark {
      position: absolute;
      bottom: 8mm;
      left: 14mm;
      right: 14mm;
      display: flex;
      justify-content: space-between;
      font-family: "Inter", sans-serif;
      font-size: 7pt;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--faint);
      pointer-events: none;
    }
    .page-mark .red { color: var(--red); }
    @media print {
      .page-mark { display: none; }   /* esconde no print, dá mais espaço útil */
    }

    /* Mensagem de erro caso data.js não carregue */
    .error {
      padding: 20mm;
      font-family: "Inter", sans-serif;
      color: var(--red);
      background: white;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <strong>Surreal · Cardápio para impressão</strong><br/>
    Pressione <kbd>Cmd+P</kbd> (Mac) ou <kbd>Ctrl+P</kbd> (Windows) → escolha <strong>"Salvar como PDF"</strong>.<br/>
    Imprima em <strong>papel A4 retrato</strong> — 4 folhas pra prancheta.
    <br/>
    <button onclick="window.print()">Imprimir agora</button>
  </div>

  <div class="pages-container" id="pages">
    <div class="error">Carregando dados do cardápio...</div>
  </div>

  <script src="/data.js"></script>
  <script>
    // Helpers
    function pt(val) {
      if (val == null) return '';
      if (typeof val === 'string') return val;
      if (Array.isArray(val)) return val;
      return val.pt || val.en || val.es || '';
    }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function tagBadge(tag) {
      if (!tag) return '';
      const cls = tag === 'Chef' ? 'chef' : '';
      return `<span class="item-tag ${cls}">${esc(tag)}</span>`;
    }

    function metaBadge(item) {
      const parts = [];
      if (item.ml) parts.push(`${item.ml}ML`);
      return parts.length ? `<span class="item-meta">${parts.join(' · ')}</span>` : '';
    }

    function renderItem(item, opts = {}) {
      const nome = pt(item.nome);
      const desc = pt(item.desc);
      const base = !opts.hideBase && item.base && item.secao !== 'cervejas' && item.secao !== 'chopp' && item.secao !== 'soft' && opts.showBase ? `<span class="item-base">${esc(item.base)}</span>` : '';
      // Sem tag/badge no impresso — pedido do cliente
      return `
        <div class="item">
          <div class="item-row">
            <div class="item-name">${esc(nome)}${metaBadge(item)}${base}</div>
            <div class="item-price">R$ ${item.preco}</div>
          </div>
          ${desc ? `<div class="item-desc">${esc(desc)}</div>` : ''}
        </div>
      `;
    }

    function renderItemCompact(item) {
      const nome = pt(item.nome);
      const desc = pt(item.desc);
      return `
        <div class="item">
          <div class="item-row">
            <div class="item-name">${esc(nome)}${metaBadge(item)}</div>
            <div class="item-price">R$ ${item.preco}</div>
          </div>
          ${desc ? `<div class="item-desc">${esc(desc)}</div>` : ''}
        </div>
      `;
    }

    function renderSection(secao, items, opts = {}) {
      if (!items.length) return '';
      const nome = pt(secao.nome);
      const sub = pt(secao.subtitle);
      const cls = opts.singleColumn ? 'columns-1' : 'columns-2';
      return `
        <div class="section-header">
          <h2 class="section-name">${esc(nome)}</h2>
          ${sub ? `<span class="section-subtitle">${esc(sub)}</span>` : ''}
        </div>
        <div class="${cls}">
          ${items.map(it => renderItem(it, opts)).join('')}
        </div>
      `;
    }

    function renderCover() {
      const D = window.SURREAL;
      const tagline = pt(D.info.tagline);
      return `
        <section class="page cover">
          <div class="cover-inner">
            <div class="cover-mark">CARDÁPIO · EDIÇÃO 2026</div>
            <img src="/assets/logo-wordmark.png" alt="Surreal" class="cover-logo" />
            <div class="cover-divider"></div>
            <h1 class="cover-title">UM MENU<br/><span class="red">surreal.</span></h1>
            <div class="cover-tag">"${esc(tagline)}"</div>
            <div class="cover-meta">BOTAFOGO · <span>RIO DE JANEIRO</span></div>
          </div>
        </section>
      `;
    }

    function renderExtrasBox() {
      const D = window.SURREAL;
      if (!D.extras || !D.extras.length) return '';
      return `
        <div class="extras-box">
          <div class="section-header" style="border-bottom: 1px solid var(--ink); margin-top: 0;">
            <h2 class="section-name">Complementos</h2>
            <span class="section-subtitle">deixe seu sanduíche ainda mais surreal</span>
          </div>
          <div class="columns-2">
            ${D.extras.map(x => `
              <div class="item" style="border-bottom: none; padding-bottom: 1mm;">
                <div class="item-row">
                  <span class="item-name" style="font-style: normal; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 10pt;">${esc(pt(x.item))}</span>
                  <span class="item-price">R$ ${x.preco}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderComidas() {
      const D = window.SURREAL;
      const findSec = (id) => D.secoes.comidas.find(s => s.id === id);
      const itemsOf = (id) => D.menu.filter(d => d.secao === id);

      // ===== COLUNA ESQUERDA: Entradas + Pratos Principais =====
      let leftHtml = '';
      const entradas = findSec('entradas');
      const principais = findSec('principais');
      if (entradas) leftHtml += renderSection(entradas, itemsOf('entradas'), { singleColumn: true });
      if (principais) leftHtml += renderSection(principais, itemsOf('principais'), { singleColumn: true });

      // ===== COLUNA DIREITA: Sanduíches + Complementos (borda vermelha) + Sobremesas =====
      let rightHtml = '';
      const sanduiches = findSec('sanduiches');
      if (sanduiches) rightHtml += renderSection(sanduiches, itemsOf('sanduiches'), { singleColumn: true });
      rightHtml += renderExtrasBox();
      const sobremesas = findSec('sobremesas');
      if (sobremesas) rightHtml += renderSection(sobremesas, itemsOf('sobremesas'), { singleColumn: true });

      return `
        <section class="page">
          <div class="inner">
            <div class="page-header">
              <h1>Comidas</h1>
              <span class="subtitle">o que se come por aqui</span>
            </div>
            <div class="page-2col">
              <div class="col-left">${leftHtml}</div>
              <div class="col-right">${rightHtml}</div>
            </div>
          </div>
          <div class="page-mark"><span class="red">SURREAL</span><span>02 / COMIDAS</span></div>
        </section>
      `;
    }

    function renderBebidas() {
      const D = window.SURREAL;
      const findSec = (id) => D.secoes.drinks.find(s => s.id === id);
      const itemsOf = (id) => D.bebidas.filter(b => b.secao === id);

      const renderSecionsLista = (ids) => {
        let h = '';
        D.secoes.drinks.forEach(s => {
          if (!ids.includes(s.id)) return;
          const items = itemsOf(s.id);
          if (items.length) h += renderSection(s, items, { singleColumn: true });
        });
        return h;
      };

      // ===== COLUNA ESQUERDA: drinks autorais (Leves + Intensos + Sem-Álcool) =====
      const leftHtml = renderSecionsLista(['leves', 'intensos', 'sem-alcool']);

      // ===== COLUNA DIREITA: Clássicos zero + Drinks Clássicos =====
      const rightHtml = renderSecionsLista(['classicos-zero', 'classicos']);

      return `
        <section class="page page-spacious">
          <div class="inner">
            <div class="page-header">
              <h1>Bebidas</h1>
              <span class="subtitle">entre o real e o imaginado</span>
            </div>
            <div class="page-2col">
              <div class="col-left">${leftHtml}</div>
              <div class="col-right">${rightHtml}</div>
            </div>
          </div>
          <div class="page-mark"><span class="red">SURREAL</span><span>03 / BEBIDAS</span></div>
        </section>
      `;
    }

    function renderVinhos() {
      const D = window.SURREAL;

      // ===== COLUNA ESQUERDA: VINHOS =====
      const semVinicola = D.vinhos.filter(v => !v.vinicola);
      const vinicolaOrder = [];
      const byVinicola = {};
      D.vinhos.forEach(v => {
        if (!v.vinicola) return;
        if (!byVinicola[v.vinicola]) {
          byVinicola[v.vinicola] = { pais: v.pais, byTipo: {}, tipoOrder: [] };
          vinicolaOrder.push(v.vinicola);
        }
        const block = byVinicola[v.vinicola];
        if (!block.byTipo[v.tipo]) {
          block.byTipo[v.tipo] = [];
          block.tipoOrder.push(v.tipo);
        }
        block.byTipo[v.tipo].push(v);
      });

      let winesHtml = `
        <div class="section-header" style="margin-top: 0;">
          <h2 class="section-name">Carta de Vinhos</h2>
          <span class="section-subtitle">por taça ou garrafa</span>
        </div>
      `;

      if (semVinicola.length) {
        winesHtml += `
          <div class="vinicola">
            <div class="vinicola-tipo">Por Taça</div>
            ${semVinicola.map(renderItemCompact).join('')}
          </div>
        `;
      }

      // Vinicolas em coluna única (não usa columns-2 interno)
      vinicolaOrder.forEach(v => {
        const block = byVinicola[v];
        winesHtml += `
          <div class="vinicola">
            <div class="vinicola-header">
              <span class="vinicola-name">${esc(v)}</span>
              ${block.pais ? `<span class="vinicola-pais">${esc(block.pais)}</span>` : ''}
            </div>
            ${block.tipoOrder.map(tipo => `
              <div class="vinicola-tipo">${esc(tipo)}</div>
              ${block.byTipo[tipo].map(renderItemCompact).join('')}
            `).join('')}
          </div>
        `;
      });

      // ===== COLUNA DIREITA: CERVEJAS + SOFT =====
      const cervejaSecoes = D.secoes.drinks.filter(s => s.id === 'chopp' || s.id === 'cervejas');
      const softSecao = D.secoes.drinks.find(s => s.id === 'soft');
      let rightHtml = '';
      cervejaSecoes.forEach(s => {
        const items = D.bebidas.filter(b => b.secao === s.id);
        if (items.length) rightHtml += renderSection(s, items, { singleColumn: true });
      });
      if (softSecao) {
        const items = D.bebidas.filter(b => b.secao === softSecao.id);
        if (items.length) rightHtml += renderSection(softSecao, items, { singleColumn: true });
      }

      return `
        <section class="page page-spacious">
          <div class="inner" style="padding-bottom: 8mm;">
            <div class="page-header">
              <h1>Vinhos & Cervejas</h1>
              <span class="subtitle">por taça, garrafa, copo ou alegria</span>
            </div>

            <div class="page-2col">
              <div class="col-left">
                ${winesHtml}
              </div>
              <div class="col-right">
                ${rightHtml}
              </div>
            </div>

            <div class="footer-block-wrap">
              <div class="legal-unified">
                <img src="/assets/mascot.png" alt="" class="legal-mascot" />
                <div class="legal-text">
                  <h3>Atenção, viajante do sabor</h3>
                  <p>
                    Alguns pratos podem conter lactose, glúten, nozes, pimenta ou outros ingredientes alergênicos.
                    Se tiver qualquer restrição, alergia ou "inimizade" alimentar, avise nossa equipe antes de pedir.
                    Aceitamos dinheiro, pix, cartões de débito/crédito e vouchers (consulte com o atendente).
                    Procon 151 · Vigilância Sanitária 1746 · Se beber, não dirija. Proibida a venda de bebida alcoólica para menores de 18 anos. Exija cupom fiscal.
                  </p>
                </div>
              </div>
            </div>
          </div>
          <div class="page-mark"><span class="red">SURREAL</span><span>04 / VINHOS · CERVEJAS · SUCOS</span></div>
        </section>
      `;
    }

    function render() {
      try {
        const root = document.getElementById('pages');
        if (!window.SURREAL) {
          root.innerHTML = '<div class="error">Erro: dados do cardápio não carregaram. Recarregue a página.</div>';
          return;
        }
        root.innerHTML =
          renderCover() +
          renderComidas() +
          renderBebidas() +
          renderVinhos();
        document.title = 'Surreal · Cardápio 2026 (impressão)';
      } catch (e) {
        document.getElementById('pages').innerHTML = `<div class="error">Erro ao renderizar: ${esc(e.message)}</div>`;
        console.error(e);
      }
    }

    render();
  </script>
</body>
</html>
